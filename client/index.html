<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Finance Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0b0f19; }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex flex-col justify-between">

    <header class="border-b border-slate-800 bg-slate-900/50 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2.5">
                
                <span class="font-bold text-lg tracking-tight bg-gradient-to-r from-white to-slate-400 bg-clip-text text-transparent">Finance tracker</span>
            </div>
            <div class="text-sm text-slate-400 font-medium" id="current-date"></div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 flex-grow w-full">
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-5 mb-8">
            <div class="bg-slate-900 border border-slate-800 rounded-xl p-5 relative overflow-hidden group">
                <p class="text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1">Total Inflow (Income)</p>
                <h3 class="text-3xl font-bold text-emerald-400 tracking-tight" id="metric-income">$0.00</h3>
            </div>
            
            <div class="bg-slate-900 border border-slate-800 rounded-xl p-5 relative overflow-hidden group">
                <p class="text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1">Total Outflow (Expenses)</p>
                <h3 class="text-3xl font-bold text-rose-400 tracking-tight" id="metric-expense">$0.00</h3>
            </div>

            <div class="bg-slate-900 border border-slate-800 rounded-xl p-5 relative overflow-hidden group">
                <p class="text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1">Net Cash Burn / Balance</p>
                <h3 class="text-3xl font-bold tracking-tight" id="metric-net">$0.00</h3>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 items-start">
            <div class="bg-slate-900 border border-slate-800 rounded-xl p-6 lg:col-span-1">
                <h2 class="text-lg font-bold text-white mb-4 flex items-center gap-2">
                    <i data-lucide="plus-circle" class="w-5 h-5 text-emerald-400"></i> Log Transaction
                </h2>
                <form id="transaction-form" class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1.5">Flow Type</label>
                        <div class="grid grid-cols-2 gap-2">
                            <button type="button" id="type-expense" onclick="setType('expense')" class="w-full py-2 rounded-lg font-semibold text-sm transition-colors border bg-rose-500/10 border-rose-500/40 text-rose-400">Expense</button>
                            <button type="button" id="type-income" onclick="setType('income')" class="w-full py-2 rounded-lg font-semibold text-sm transition-colors border bg-slate-950 border-slate-800 text-slate-400">Income</button>
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1.5">Amount ($)</label>
                        <input type="number" step="0.01" required id="amount" placeholder="0.00" 
                            class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3.5 py-2 text-white placeholder-slate-600 focus:outline-none focus:border-emerald-500 transition-colors">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1.5">Category</label>
                        <select id="category" required class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3.5 py-2 text-white focus:outline-none focus:border-emerald-500 transition-colors">
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1.5">Description</label>
                        <input type="text" required id="description" placeholder="e.g., Monthly Pay, Coffee" 
                            class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3.5 py-2 text-white placeholder-slate-600 focus:outline-none focus:border-emerald-500 transition-colors">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1.5">Date</label>
                        <input type="date" required id="date" 
                            class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3.5 py-2 text-white focus:outline-none focus:border-emerald-500 transition-colors">
                    </div>
                    <button type="submit" class="w-full bg-emerald-500 hover:bg-emerald-600 active:bg-emerald-700 text-slate-950 font-semibold rounded-lg py-2.5 transition-colors flex items-center justify-center gap-2 mt-2 shadow-lg shadow-emerald-500/10">
                        <i data-lucide="check-circle" class="w-4 h-4"></i> Commit Entry
                    </button>
                </form>
            </div>

            <div class="lg:col-span-2 space-y-4">
                <div class="bg-slate-900 border border-slate-800 rounded-xl p-4 grid grid-cols-1 sm:grid-cols-2 gap-4 items-center">
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1.5">Filter</label>
                        <select id="filter-type" onchange="setFilters()" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-1.5 text-sm text-white focus:outline-none">
                            <option value="all">All Types</option>
                            <option value="income">Income Only</option>
                            <option value="expense">Expense Only</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1.5">Filter by Category</label>
                        <select id="filter-category" onchange="setFilters()" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-1.5 text-sm text-white focus:outline-none">
                        </select>
                    </div>
                </div>

                <div class="flex items-center justify-between">
                    <h2 class="text-lg font-bold text-white flex items-center gap-2">
                        <i data-lucide="list-filter" class="w-5 h-5 text-violet-400"></i> Transactions
                    </h2>
                    <span class="text-xs bg-slate-900 border border-slate-800 px-2.5 py-1 rounded-md text-slate-400 font-medium" id="ledger-count">0 Records Shown</span>
                </div>
                
                <div class="bg-slate-900 border border-slate-800 rounded-xl overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="border-b border-slate-800 bg-slate-950/40 text-xs font-semibold uppercase tracking-wider text-slate-400">
                                    <th class="py-3.5 px-4">Date</th>
                                    <th class="py-3.5 px-4">Description</th>
                                    <th class="py-3.5 px-4">Category</th>
                                    <th class="py-3.5 px-4 text-right">Amount</th>
                                    <th class="py-3.5 px-4 text-center">Action</th>
                                </tr>
                            </thead>
                            <tbody id="ledger-body" class="divide-y divide-slate-800/60 text-sm"></tbody>
                        </table>
                    </div>
                    <div id="empty-state" class="hidden py-12 text-center text-slate-500 flex flex-col items-center justify-center gap-2">
                        <i data-lucide="database-zap" class="w-8 h-8 text-slate-600"></i>
                        <p class="font-medium">No records match your view filter.</p>
                    </div>
                </div>
            </div>
        </div>
    </main>


    <script>
        const categoryOptions = {
            expense: ['Food', 'Transport', 'Utilities', 'Entertainment', 'Subscriptions', 'Shopping', 'Other Core Expenses'],
            income: ['Salary', 'Freelance Work', 'Investment Returns', 'Gifts/Dividends']
        };

        // FIXED: Re-instantiated core vector state tracking array and storage pipes
        let state = {
            currentFormType: 'expense',
            filters: { type: 'all', category: 'all' },
            
        };

        const form = document.getElementById('transaction-form');
        const catSelect = document.getElementById('category');
        const filterCatSelect = document.getElementById('filter-category');

        function init() {
            document.getElementById('date').value = new Date().toISOString().split('T')[0];
            document.getElementById('current-date').innerText = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            updateCategoryDropdown();
            populateFilterOptions();
            render();
        }

        function setType(type) {
            state.currentFormType = type;
            const btnExp = document.getElementById('type-expense');
            const btnInc = document.getElementById('type-income');
            
            if(type === 'expense') {
                btnExp.className = "w-full py-2 rounded-lg font-semibold text-sm transition-colors border bg-rose-500/10 border-rose-500/40 text-rose-400";
                btnInc.className = "w-full py-2 rounded-lg font-semibold text-sm transition-colors border bg-slate-950 border-slate-800 text-slate-400";
            } else {
                btnInc.className = "w-full py-2 rounded-lg font-semibold text-sm transition-colors border bg-emerald-500/10 border-emerald-500/40 text-emerald-400";
                btnExp.className = "w-full py-2 rounded-lg font-semibold text-sm transition-colors border bg-slate-950 border-slate-800 text-slate-400";
            }
            updateCategoryDropdown();
        }

        function updateCategoryDropdown() {
            catSelect.innerHTML = categoryOptions[state.currentFormType].map(cat => `<option value="${cat}">${cat}</option>`).join('');
        }

        function populateFilterOptions() {
            const currentFilterSelection = filterCatSelect.value || 'all';
            let html = '<option value="all">All Categories</option>';
            const uniqueCategories = [...new Set(state.transactions.map(t => t.category))];
            html += uniqueCategories.map(cat => `<option value="${cat}">${cat}</option>`).join('');
            filterCatSelect.innerHTML = html;
            filterCatSelect.value = currentFilterSelection;
        }

        function setFilters() {
            state.filters.type = document.getElementById('filter-type').value;
            state.filters.category = filterCatSelect.value;
            render();
        }

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const newTx = {
                id: Date.now(),
                type: state.currentFormType,
                amount: parseFloat(document.getElementById('amount').value),
                category: catSelect.value,
                description: document.getElementById('description').value,
                date: document.getElementById('date').value
            };
            state.transactions.unshift(newTx);
            localStorage.setItem('ledger_data_v2', JSON.stringify(state.transactions));
            populateFilterOptions();
            render();
            form.reset();
            setType('expense');
            document.getElementById('date').value = new Date().toISOString().split('T')[0];
        });

        window.deleteTransaction = function(id) {
            state.transactions = state.transactions.filter(tx => tx.id !== id);
            localStorage.setItem('ledger_data_v2', JSON.stringify(state.transactions));
            populateFilterOptions();
            render();
        };

        function render() {
            const txs = state.transactions;
            
            const globalIncome = txs.filter(t => t.type === 'income').reduce((a, b) => a + b.amount, 0);
            const globalExpense = txs.filter(t => t.type === 'expense').reduce((a, b) => a + b.amount, 0);
            const netBalance = globalIncome - globalExpense;

            document.getElementById('metric-income').innerText = `$${globalIncome.toLocaleString('en-US', {minimumFractionDigits:2})}`;
            document.getElementById('metric-expense').innerText = `$${globalExpense.toLocaleString('en-US', {minimumFractionDigits:2})}`;
            
            const netNode = document.getElementById('metric-net');
            netNode.innerText = `${netBalance < 0 ? '-' : ''}$${Math.abs(netBalance).toLocaleString('en-US', {minimumFractionDigits:2})}`;
            netNode.className = `text-3xl font-bold tracking-tight ${netBalance >= 0 ? 'text-emerald-400' : 'text-rose-400'}`;

            let filteredTxs = txs.filter(t => {
                const typeMatch = state.filters.type === 'all' || t.type === state.filters.type;
                const catMatch = state.filters.category === 'all' || t.category === state.filters.category;
                return typeMatch && catMatch;
            });

            document.getElementById('ledger-count').innerText = `${filteredTxs.length} Record${filteredTxs.length === 1 ? '' : 's'} Found`;
            
            if(filteredTxs.length === 0) {
                document.getElementById('ledger-body').innerHTML = '';
                document.getElementById('empty-state').classList.remove('hidden');
                return;
            }
            document.getElementById('empty-state').classList.add('hidden');

            document.getElementById('ledger-body').innerHTML = filteredTxs.map(tx => `
                <tr class="hover:bg-slate-900/40 transition-colors group">
                    <td class="py-3 px-4 text-slate-400 font-medium">${tx.date}</td>
                    <td class="py-3 px-4 font-semibold text-white">${tx.description}</td>
                    <td class="py-3 px-4">
                        <span class="px-2.5 py-0.5 rounded-full text-xs font-semibold bg-slate-800 border border-slate-700 text-slate-300">
                            ${tx.category}
                        </span>
                    </td>
                    <td class="py-3 px-4 text-right font-bold ${tx.type === 'income' ? 'text-emerald-400' : 'text-rose-400'}">
                        ${tx.type === 'income' ? '+' : '-'}$${tx.amount.toFixed(2)}
                    </td>
                    <td class="py-3 px-4 text-center">
                        <button onclick="deleteTransaction(${tx.id})" class="text-slate-600 hover:text-rose-400 p-1 transition-colors">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
            
            lucide.createIcons();
        }

        init();
    </script>
</body>
</html>
